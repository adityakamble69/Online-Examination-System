<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>

/* ================= GLOBAL ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI',sans-serif;
  min-height:100vh;
  background: linear-gradient(135deg,#1e1b4b,#312e81,#1e1b4b);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:white;
}

/* ================= MAIN CONTAINER ================= */

.container{
  width:100%;
  max-width:1100px;
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(25px);
  border-radius:25px;
  padding:40px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  animation:fadeIn .6s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

h1{
  text-align:center;
  margin-bottom:35px;
  font-weight:600;
  letter-spacing:1px;
}

/* ================= GRID SECTION ================= */

.dashboard-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin-bottom:40px;
}

.card{
  background:rgba(255,255,255,0.08);
  padding:25px;
  border-radius:18px;
  text-align:center;
  cursor:pointer;
  transition:.3s ease;
  box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 15px 30px rgba(0,0,0,0.6);
}

.card span{
  font-size:28px;
  display:block;
  margin-bottom:10px;
}

/* ================= CREATE STUDENT ================= */

.create-box{
  background:rgba(255,255,255,0.08);
  padding:30px;
  border-radius:20px;
}

.create-box h3{
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px 15px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

input::placeholder{
  color:#ccc;
}

button{
  padding:12px 22px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
  font-weight:500;
  cursor:pointer;
  transition:.3s ease;
  margin-top:10px;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.logout-btn{
  margin-top:25px;
  background:linear-gradient(135deg,#ff4d4d,#ff0000);
}

/* ================= RESPONSIVE ================= */

/* Tablet */
@media(max-width:992px){
  .dashboard-grid{
    grid-template-columns:repeat(2,1fr);
  }
}

/* Mobile */
@media(max-width:600px){
  .container{
    padding:25px;
  }

  .dashboard-grid{
    grid-template-columns:1fr;
  }

  h1{
    font-size:22px;
  }
}

</style>
</head>

<body>

<script>
if (!sessionStorage.getItem("admin")) {
    alert("Unauthorized Access");
    window.location.href = "index.html";
}
</script>

<div class="container">

<h1>🎯 Admin Dashboard</h1>

<!-- Dashboard Buttons -->
<div class="dashboard-grid">

  <div class="card">
    <span>📤</span>
    Upload Questions
  </div>

  <div class="card">
    <span>⏱</span>
    Set Exam Duration
  </div>

  <div class="card">
    <span>📊</span>
    Monitor Attempts
  </div>

  <div class="card">
    <span>🏆</span>
    View Leaderboard
  </div>

</div>

<!-- Create Student Section -->
<div class="create-box">
  <h3>Create Student</h3>

  <input type="text" id="newStudentName" placeholder="Student Name">
  <input type="email" id="newStudentEmail" placeholder="Student Email">
  <button onclick="createStudent()">Create Student</button>
</div>

<button class="logout-btn" onclick="logout()">Logout</button>

</div>

<div id="overlayLoader" class="hidden">
    <div class="spinner"></div>
</div>

<script src="script.js"></script>

<script>
function logout(){
  sessionStorage.clear();
  window.location.href="index.html";
}
</script>

</body>
</html>
