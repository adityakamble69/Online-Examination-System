<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
</head>

<body>
    <script>
        if (!sessionStorage.getItem("admin")) {
            alert("Unauthorized Access");
            window.location.href = "index.html";
        }
    </script>

    <h1>🎯 Admin Dashboard</h1>

    <button>📤 Upload Questions</button><br><br>
    <button>⏱ Set Exam Duration</button><br><br>
    <button>📊 Monitor Attempts</button><br><br>
    <button>🏆 View Leaderboard</button><br><br>
    <button onclick="logout()">Logout</button>

    <script>
        function logout() {
            window.location.href = "index.html";
        }
    </script>

</body>

</html>
