<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Examination System</title>

    <style>
        /* =========================
   GLOBAL RESET
========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e1b4b, #312e81, #1e1b4b);
            color: #fff;
            padding: 20px;
        }

        /* =========================
   MAIN CONTAINER
========================= */
        .container {
            width: 100%;
            max-width: 900px;
            padding: 50px 40px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            font-size: 30px;
            margin-bottom: 35px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        /* =========================
   BUTTONS
========================= */
        button {
            padding: 12px 22px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            transition: 0.3s ease;
            margin: 8px 0;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        /* Role selection buttons */
        #roleSelection {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* =========================
   INPUTS
========================= */
        input {
            width: 100%;
            padding: 12px 15px;
            margin: 12px 0;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
        }

        input::placeholder {
            color: #ccc;
        }

        /* =========================
   EXAM CARD
========================= */
        .card {
            margin-top: 25px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        .option {
            margin: 10px 0;
            padding: 8px 10px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* =========================
   TIMER
========================= */
        .timer {
            font-size: 18px;
            margin-bottom: 20px;
            text-align: right;
            color: #ff7675;
            font-weight: 500;
        }

        /* =========================
   RESULT SECTION
========================= */
        #resultSection {
            text-align: center;
        }

        #resultSection p {
            margin: 10px 0;
            font-size: 16px;
        }

        /* =========================
   UTILITIES
========================= */
        .hidden {
            display: none !important;
        }

        /* =========================
   RESPONSIVE DESIGN
========================= */

        /* Tablet */
        @media (max-width:768px) {

            .container {
                padding: 35px 25px;
            }

            h1 {
                font-size: 24px;
            }

            button {
                width: 100%;
            }

            #roleSelection {
                flex-direction: column;
            }
        }

        /* Mobile */
        @media (max-width:480px) {

            body {
                padding: 10px;
            }

            .container {
                padding: 25px 20px;
                border-radius: 18px;
            }

            h1 {
                font-size: 20px;
            }

            input {
                font-size: 13px;
            }

            button {
                font-size: 13px;
                padding: 10px;
            }

            .timer {
                text-align: center;
            }
        }

        /* =========================
   FULL SCREEN LOADER
========================= */

        #overlayLoader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(20, 15, 60, 0.75);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            width: 55px;
            height: 55px;
            border: 6px solid rgba(255, 255, 255, 0.2);
            border-top: 6px solid #8b5cf6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🚀 Online Examination System</h1>

        <!-- Role Selection -->
        <div id="roleSelection">
            <button onclick="showStudent()">Student / Candidate</button>
            <button onclick="showAdmin()">Admin / Examiner</button>
            <button onclick="goToSetPassword()">Set Password</button>
        </div>

        <!-- Student Login -->
        <div id="studentLogin" class="hidden">
            <h2>Student Login</h2>
            <input type="text" id="studentId" placeholder="Student ID">
            <input type="password" id="studentPass" placeholder="Password">
            <button onclick="studentLogin()">Login</button>
            <button onclick="goBack()">Back</button>
        </div>

        <!-- Admin Login -->
        <div id="adminLogin" class="hidden">
            <h2>Admin Login</h2>
            <input type="text" id="adminId" placeholder="Admin ID">
            <input type="password" id="adminPass" placeholder="Password">
            <button onclick="adminLogin()">Login</button>
            <button onclick="goBack()">Back</button>
        </div>

    </div>
    <!-- 🔥 FULL SCREEN LOADER (YAHI ADD KARNA HAI) -->
    <div id="overlayLoader" class="hidden">
        <div class="spinner"></div>
    </div>

    <div class="theme-toggle">
</div>
    <script src="script.js"></script>
</body>

</html>
