<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Examination System</title>

<style>
/* =========================
   GLOBAL RESET
========================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: 'Segoe UI', sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#1e1b4b,#312e81,#1e1b4b);
  color:#fff;
  padding:20px;
}

/* =========================
   MAIN CONTAINER
========================= */
.container{
  width:100%;
  max-width:900px;
  padding:50px 40px;
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(25px);
  border-radius:25px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

h1{
  text-align:center;
  font-size:30px;
  margin-bottom:35px;
  font-weight:600;
  letter-spacing:1px;
}

h2{
  margin-bottom:20px;
  text-align:center;
}

/* =========================
   BUTTONS
========================= */
button{
  padding:12px 22px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:14px;
  font-weight:500;
  background: linear-gradient(135deg,#6366f1,#8b5cf6);
  color:#fff;
  transition:0.3s ease;
  margin:8px 0;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* Role selection buttons */
#roleSelection{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

/* =========================
   INPUTS
========================= */
input{
  width:100%;
  padding:12px 15px;
  margin:12px 0;
  border-radius:10px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:white;
  font-size:14px;
}

input::placeholder{
  color:#ccc;
}

/* =========================
   EXAM CARD
========================= */
.card{
  margin-top:25px;
  padding:25px;
  background:rgba(255,255,255,0.08);
  border-radius:18px;
  box-shadow:0 8px 30px rgba(0,0,0,0.4);
}

.option{
  margin:10px 0;
  padding:8px 10px;
  border-radius:8px;
  transition:0.2s;
}

.option:hover{
  background:rgba(255,255,255,0.1);
}

/* =========================
   TIMER
========================= */
.timer{
  font-size:18px;
  margin-bottom:20px;
  text-align:right;
  color:#ff7675;
  font-weight:500;
}

/* =========================
   DASHBOARD
========================= */
#adminDashboard{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.dashboard-btn{
  width:100%;
  text-align:left;
  padding:14px;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
}

.dashboard-btn:hover{
  background:rgba(255,255,255,0.2);
}

/* =========================
   RESULT SECTION
========================= */
#resultSection{
  text-align:center;
}

#resultSection p{
  margin:10px 0;
  font-size:16px;
}

/* =========================
   UTILITIES
========================= */
.hidden{
  display:none !important;
}

/* =========================
   RESPONSIVE DESIGN
========================= */

/* Tablet */
@media (max-width:768px){

  .container{
    padding:35px 25px;
  }

  h1{
    font-size:24px;
  }

  button{
    width:100%;
  }

  #roleSelection{
    flex-direction:column;
  }
}

/* Mobile */
@media (max-width:480px){

  body{
    padding:10px;
  }

  .container{
    padding:25px 20px;
    border-radius:18px;
  }

  h1{
    font-size:20px;
  }

  input{
    font-size:13px;
  }

  button{
    font-size:13px;
    padding:10px;
  }

  .timer{
    text-align:center;
  }
}
</style>
</head>
<body>

<div class="container">

<h1>🚀 Online Examination System</h1>

<!-- Role Selection -->
<div id="roleSelection">
  <button onclick="showStudent()">Student / Candidate</button>
  <button onclick="showAdmin()">Admin / Examiner</button>
</div>

<!-- Student Login -->
<div id="studentLogin" class="hidden">
  <h2>Student Login</h2>
  <input type="text" placeholder="Student ID">
  <input type="password" placeholder="Password">
  <button onclick="startExam()">Login & Start Exam</button>
  <button onclick="goBack()">Back</button>
</div>

<!-- Admin Login -->
<div id="adminLogin" class="hidden">
  <h2>Admin Login</h2>
  <input type="text" placeholder="Admin ID">
  <input type="password" placeholder="Password">
  <button onclick="openAdminDashboard()">Login</button>
  <button onclick="goBack()">Back</button>
</div>

<!-- Exam Section -->
<div id="examSection" class="hidden">
  <div class="timer">Time Left: <span id="time">60</span> sec</div>

  <div class="card">
    <h3>Q1. HTML Full Form?</h3>
    <div class="option"><input type="radio" name="q1"> Hyper Text Markup Language</div>
    <div class="option"><input type="radio" name="q1"> High Text Machine Language</div>
    <div class="option"><input type="radio" name="q1"> Home Tool Markup Language</div>
    <div class="option"><input type="radio" name="q1"> None</div>
  </div>

  <button onclick="submitExam()">Submit Exam</button>
</div>

<!-- Result Section -->
<div id="resultSection" class="hidden">
  <h2>Exam Result</h2>
  <p>Score: 8 / 10</p>
  <p>Status: ✅ Pass</p>
  <button>Download Certificate</button>
  <button onclick="location.reload()">Logout</button>
</div>

<!-- Admin Dashboard
<div id="adminDashboard" class="hidden">
  <h2>Admin Dashboard</h2>

  <button class="dashboard-btn">📤 Upload Questions</button>
  <button class="dashboard-btn">⏱ Set Exam Duration</button>
  <button class="dashboard-btn">📊 Monitor Attempts</button>
  <button class="dashboard-btn">🏆 View Leaderboard</button>
  <button class="dashboard-btn">📜 Generate Certificates</button>

  <button onclick="location.reload()">Logout</button>
</div> -->

</div>

<script>

function showStudent(){
  hideAll();
  document.getElementById("studentLogin").classList.remove("hidden");
}

function showAdmin(){
  hideAll();
  document.getElementById("adminLogin").classList.remove("hidden");
}

function goBack(){
  hideAll();
  document.getElementById("roleSelection").classList.remove("hidden");
}

function startExam(){
  hideAll();
  document.getElementById("examSection").classList.remove("hidden");
  startTimer();
}

function submitExam(){
  hideAll();
  document.getElementById("resultSection").classList.remove("hidden");
}

function openAdminDashboard(){
  window.location.href = "admin.html";
}

function hideAll(){
  document.getElementById("roleSelection").classList.add("hidden");
  document.getElementById("studentLogin").classList.add("hidden");
  document.getElementById("adminLogin").classList.add("hidden");
  document.getElementById("examSection").classList.add("hidden");
  document.getElementById("resultSection").classList.add("hidden");
  document.getElementById("adminDashboard").classList.add("hidden");
}
function startTimer(){
  let timeLeft = 60;
  const timer = setInterval(()=>{
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;
    if(timeLeft <= 0){
      clearInterval(timer);
      submitExam();
    }
  },1000);
}

</script>

</body>
</html>
